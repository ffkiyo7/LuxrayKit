<style>
  .split { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:16px; }
  .phone { border:1px solid #3c4452; border-radius:28px; overflow:hidden; background:#101318; color:#f8fafc; min-height:680px; }
  .screen { padding:16px 14px 76px; }
  h2,h3,p { margin:0; }
  .header { display:grid; grid-template-columns:36px 1fr; gap:10px; align-items:start; }
  .back { width:34px; height:34px; border:1px solid #334155; border-radius:12px; background:#171c25; color:#dbeafe; font-size:18px; font-weight:900; }
  .header h2, .head h2 { font-size:25px; margin-bottom:5px; }
  .sub { color:#a7b0c0; font-size:12px; line-height:1.45; }
  .panel, .team-card { border:1px solid #293140; background:#171c25; border-radius:16px; padding:12px; margin-top:14px; }
  .team-card { background:#0f172a; }
  .team-card.highlight { border-color:#60a5fa; box-shadow:0 0 0 2px rgba(96,165,250,.22); }
  .toast { display:flex; justify-content:space-between; gap:8px; align-items:center; border:1px solid #2563eb; background:#172554; color:#dbeafe; border-radius:14px; padding:10px 11px; margin-top:12px; font-size:12px; }
  .toast strong { color:#fff; }
  .team-head { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
  .team-head strong { display:block; font-size:14px; line-height:1.25; }
  .team-head span { color:#94a3b8; font-size:11px; display:block; margin-top:4px; }
  .badge { border:1px solid #334155; border-radius:999px; color:#dbeafe; padding:4px 7px; font-size:10px; white-space:nowrap; }
  .team-icons { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; margin:11px 0; }
  .team-icons i { aspect-ratio:1; border-radius:10px; background:#dbeafe; display:block; }
  .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .actions button { border:0; border-radius:11px; padding:10px 4px; background:#2563eb; color:#fff; font-size:12px; font-weight:900; }
  .actions button:last-child { background:#242c3a; color:#dbeafe; }
  .nav { margin-top:18px; display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid #293140; }
  .nav span { text-align:center; padding:11px 0 0; color:#94a3b8; font-size:11px; }
  .nav .on { color:#60a5fa; font-weight:900; }
  @media (max-width: 900px) { .split { grid-template-columns:1fr; } }
</style>
