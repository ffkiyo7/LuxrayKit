<style>
  .split { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:16px; }
  .phone { border:1px solid #3c4452; border-radius:28px; overflow:hidden; background:#101318; color:#f8fafc; min-height:680px; }
  .screen { padding:16px 14px 76px; }
  h2,h3,p { margin:0; }
  .header { display:grid; grid-template-columns:36px 1fr auto; gap:10px; align-items:start; }
  .back,.trash { width:34px; height:34px; border:1px solid #334155; border-radius:12px; background:#171c25; color:#dbeafe; font-size:18px; font-weight:900; }
  .trash { color:#fca5a5; }
  .title { font-size:22px; line-height:1.25; font-weight:900; }
  .title.editing { display:block; width:100%; border:1px solid #60a5fa; border-radius:12px; background:#0f172a; color:#f8fafc; padding:8px 10px; font-size:18px; font-weight:900; }
  .sub { color:#a7b0c0; font-size:12px; line-height:1.45; margin-top:5px; }
  .panel { border:1px solid #293140; background:#171c25; border-radius:16px; padding:12px; margin-top:14px; }
  .section-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .section-title strong { font-size:15px; }
  .section-title span { color:#93c5fd; font-size:12px; }
  .member-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .slot { border:1px solid #293140; background:#0f172a; border-radius:15px; padding:10px; min-height:138px; }
  .poke { display:block; width:58px; height:58px; border-radius:16px; background:#dbeafe; margin:0 auto 8px; }
  .slot strong { display:block; text-align:center; font-size:14px; }
  .types { display:flex; justify-content:center; gap:4px; margin:7px 0; }
  .type { border-radius:5px; padding:2px 5px; font-size:10px; font-weight:900; line-height:1; }
  .fire { background:#fb923c; color:#431407; }
  .fly { background:#93c5fd; color:#172554; }
  .fairy { background:#f9a8d4; color:#500724; }
  .grass { background:#86efac; color:#052e16; }
  .item { display:flex; justify-content:center; align-items:center; gap:5px; color:#a7b0c0; font-size:11px; }
  .item i { width:16px; height:16px; border-radius:5px; background:#fde68a; display:block; }
  .danger { margin-top:14px; border:1px solid #7f1d1d; background:#1f1115; border-radius:16px; padding:12px; }
  .danger button { width:100%; border:1px solid #991b1b; background:#2b1116; color:#fca5a5; border-radius:12px; padding:11px; font-weight:900; }
  .hint { margin-top:8px; color:#94a3b8; font-size:11px; line-height:1.45; }
  @media (max-width:900px){.split{grid-template-columns:1fr;}}
</style>

<h2>队伍标题编辑与删除入口</h2>
<p class="subtitle">改名直接点标题；删除是低频危险操作，不和改名混在更多菜单里。</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">A. 默认状态：标题可点，右侧是明确删除入口</div>
    <div class="mockup-body">
      <div class="phone">
        <div class="screen">
          <header class="header">
            <button class="back">‹</button>
            <div><div class="title">作者名 · 2724 · 喷火龙核心</div><p class="sub">点标题可改名 · 本地队伍</p></div>
            <button class="trash">删</button>
          </header>
          <section class="panel">
            <div class="section-title"><strong>队伍成员</strong><span>6/6</span></div>
            <div class="member-grid">
              <div class="slot"><i class="poke"></i><strong>喷火龙</strong><div class="types"><span class="type fire">火</span><span class="type fly">飞行</span></div><div class="item"><i></i><span>喷火龙进化石X</span></div></div>
              <div class="slot"><i class="poke"></i><strong>风妖精</strong><div class="types"><span class="type fairy">妖精</span><span class="type grass">草</span></div><div class="item"><i></i><span>气势披带</span></div></div>
            </div>
          </section>
          <section class="danger">
            <button>删除队伍</button>
            <p class="hint">如果不想顶部放删除图标，也可以只放在页面底部危险区。</p>
          </section>
        </div>
      </div>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">B. 点标题后：变成可编辑文本框</div>
    <div class="mockup-body">
      <div class="phone">
        <div class="screen">
          <header class="header">
            <button class="back">‹</button>
            <div>
              <input class="title editing" value="作者名 · 2724 · 喷火龙核心" />
              <p class="sub">完成后自动保存，或失焦保存</p>
            </div>
            <button class="trash">删</button>
          </header>
          <section class="panel">
            <div class="section-title"><strong>队伍成员</strong><span>6/6</span></div>
            <div class="member-grid">
              <div class="slot"><i class="poke"></i><strong>喷火龙</strong><div class="types"><span class="type fire">火</span><span class="type fly">飞行</span></div><div class="item"><i></i><span>喷火龙进化石X</span></div></div>
              <div class="slot"><i class="poke"></i><strong>风妖精</strong><div class="types"><span class="type fairy">妖精</span><span class="type grass">草</span></div><div class="item"><i></i><span>气势披带</span></div></div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </div>
</div>
